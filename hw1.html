<html lang="en">    
    <head>  
        <link rel="stylesheet" href="hw1.css"> 
    
        <title> Patient Registration Form | Kona Clinic</title>
    </head>
    <body>
        <!-- Header section with clinic logo, name, and current date -->
        <header>    
            <table width="100%">
                <tr>
                    <td valign="top" align="left" width="20%">
                        <div class="image">
                            <img align="center" src="cliniclogo.png" alt="Kona Clinic Logo" width="70px" id="logo"/>
                        </div>
                    </td>
                    
                    <td>    
                        <h2> Kona Clinic</h2>
                    </td>

                    <td valign="bottom" align="right" width="20%">
                        Today's Date: <span id="today"></span>
                    </td>
                </tr>
            </table>
        </header>
<hr>
<form action="thankyou.html">
    <center>
        <div class="format">
            <table>
                <tr>
                    <th colspan="4">Patient Registration Form</th>
                </tr>
                <!-- Patient information starts here-->

                <tr> 
                    <td class="td1"><label for="fName">First Name:</label></td>
                    <td>
                        <input 
                        type="text" 
                        name="fName"
                        id="fName"
                        maxlength="30"
                        required
                        title="Please enter your first name"
                        placeholder="John"
                        />
                    </td>
                </tr>

                 <tr> 
                    <td class="td1"><label for="mi">Middle Initial:</label></td>
                    <td>
                        <input 
                        type="text" 
                        name="mi"
                        id="mi"
                        maxlength="1"
                        title="Please enter your middle initial"
                        placeholder="A"
                        />
                    </td>
                </tr>

                 <tr> 
                    <td class="td1"><label for="lName">Last Name:</label></td>
                    <td>
                        <input 
                        type="text" 
                        name="lName"
                        id="lName"
                        maxlength="30"
                        required
                        title="Please enter your last name"
                        placeholder="Smith"
                        />
                    </td>
                </tr>

                <tr>
                    <td class="td1"><label for="gender">Gender:</label></td>
                    <td>
                        <input
                        type="radio" 
                        id="g1"
                        name="gender"
                        value="Male"
                        />
                        Male

                        <input
                        type="radio" 
                        id="g2"
                        name="gender"
                        value="Female"
                        />
                        Female

                        <input
                        type="radio" 
                        id="g3"
                        name="gender"
                        value="Other"
                        />
                        Other
                    </td>
                </tr>

                <tr> 
                    <td class="td1"><label for="dob">Date of Birth:</label></td>
                    <td> 
                        <input
                        type="date"
                        id="dob"
                        name="dob"
                        /> 
                    </td>
                </tr>

                <tr>
                    <td class="td1"><label for="ssn">Social Security Number:</label></td>
                    <td> 
                        <input
                        type="password"
                        minlength="9"
                        maxlength="11"
                        id="ssn"
                        pattern="[0-9]{3}-[0-9]{2}-[0-9]{4}"
                        name="ssn"
                        title="Please enter your social security number"
                        placeholder="123-45-6789"
                        />
                    </td>
                </tr>

                

                <tr> 
                    <td class="td1"><label for="address1">Address Line 1:</label></td>
                    <td>
                        <input 
                        type="text" 
                        name="address1"
                        id="address1"
                        maxlength="30"
                        required
                        title="Please enter your address"
                        placeholder="123 Main St"
                        />
                    </td>
                </tr>

                <tr> 
                    <td class="td1"><label for="address2">Address Line 2:</label></td>
                    <td>
                        <input 
                        type="text" 
                        name="address2"
                        id="address2"
                        maxlength="30"
                        title="Please enter your address"
                        placeholder="Apt. 4B"
                        />
                    </td>
                </tr>

                <tr> 
                    <td class="td1"><label for="city">City:</label></td>
                    <td>
                        <input 
                        type="text" 
                        name="city"
                        id="city"
                        maxlength="30"
                        required
                        title="Please enter your city name"
                        placeholder="Kailua-Kona"
                        />
                    </td>
                </tr>

                <tr> 
                    <td class="td1"><label for="state">State:</label></td>
                    <td>
                        <select>
                            <option selected disabled="">Select State</option>
                            <option value="AL">Alabama</option>
                            <option value="AK">Alaska</option>
                            <option value="AZ">Arizona</option>
                            <option value="AR">Arkansas</option>
                            <option value="CA">California</option>
                            <option value="CO">Colorado</option>
                            <option value="CT">Connecticut</option>
	                        <option value="DE">Delaware</option>
	                        <option value="DC">District Of Columbia</option>
	                        <option value="FL">Florida</option>
	                        <option value="GA">Georgia</option>
	                        <option value="HI">Hawaii</option>
	                        <option value="ID">Idaho</option>
	                        <option value="IL">Illinois</option>
	                        <option value="IN">Indiana</option>
	                        <option value="IA">Iowa</option>
	                        <option value="KS">Kansas</option>
	                        <option value="KY">Kentucky</option>
	                        <option value="LA">Louisiana</option>
	                        <option value="ME">Maine</option>
	                        <option value="MD">Maryland</option>
	                        <option value="MA">Massachusetts</option>
	                        <option value="MI">Michigan</option>
	                        <option value="MN">Minnesota</option>
	                        <option value="MS">Mississippi</option>
	                        <option value="MO">Missouri</option>
	                        <option value="MT">Montana</option>
	                        <option value="NE">Nebraska</option>
	                        <option value="NV">Nevada</option>
	                        <option value="NH">New Hampshire</option>
	                        <option value="NJ">New Jersey</option>
	                        <option value="NM">New Mexico</option>
	                        <option value="NY">New York</option>
	                        <option value="NC">North Carolina</option>
	                        <option value="ND">North Dakota</option>
	                        <option value="OH">Ohio</option>
	                        <option value="OK">Oklahoma</option>
	                        <option value="OR">Oregon</option>
	                        <option value="PA">Pennsylvania</option>
                            <option value="PR">Puerto Rico</option>
	                        <option value="RI">Rhode Island</option>
	                        <option value="SC">South Carolina</option>
	                        <option value="SD">South Dakota</option>
	                        <option value="TN">Tennessee</option>
                        	<option value="TX">Texas</option>
                        	<option value="UT">Utah</option>
	                        <option value="VT">Vermont</option>
                        	<option value="VA">Virginia</option>
                        	<option value="WA">Washington</option>
	                        <option value="WV">West Virginia</option>
	                        <option value="WI">Wisconsin</option>
	                        <option value="WY">Wyoming</option>
                        </select>
                    </td>
                </tr>

                <tr> 
                    <td class="td1"><label for="zip">Zip Code:</label></td>
                    <td>
                        <input 
                        type="text" 
                        name="zip"
                        id="zip"
                        pattern="[0-9]{5}"
                        maxlength="5"
                        required
                        title="Please enter your zip code"
                        placeholder="96740"
                        />
                    </td>
                </tr>

                <tr> 
                    <td class="td1"><label for="phone">Phone Number:</label></td>
                    <td>
                        <input 
                        type="text" 
                        name="phone"
                        id="phone"
                        pattern="[0-9]{3}-[0-9]{3}-[0-9]{4}"
                        maxlength="12"
                        required
                        title="Please enter your phone number"
                        placeholder="123-456-7890"
                        />
                    </td>
                </tr>

                <tr> 
                    <td class="td1"><label for="email">Email Address:</label></td>
                    <td>
                        <input 
                        type="text" 
                        name="email"
                        id="email"
                        maxlength="100"
                        required
                        title="Please enter your email address"
                        placeholder="example@email.com"
                        />
                    </td>
                </tr>

                

                <tr> 
                    <td class="td1"><label for="history">Check all that apply:</label></td>
                    <td> 
                        <input type="checkbox" id="option 1" value="Ulcerative Colitis">
                        <label for="Ulcerative Colitis">Ulcerative Colitis</label><br>

                        <input type="checkbox" id="option 2" value="Chicken Pox">
                        <label for="Chicken Pox">Chicken Pox</label><br>

                        <input type="checkbox" id="option 3" value="Covid-19">
                        <label for="Covid-19">Covid-19</label><br>

                        <input type="checkbox" id="option 4" value="Hantavirus">
                        <label for="Hantavirus">Hantavirus</label><br>

                        <input type="checkbox" id="option 5" value="Pneumonia">
                        <label for="Pneumonia">Pneumonia</label><br>

                        <input type="checkbox" id="option 6" value="Strep Throat">
                        <label for="Strep Throat">Strep Throat</label><br>
                    </td>
                </tr>

                <tr>
                    <td class="td1" align="right">
                        <label for="notes">Additional Notes:</label>
                    </td>
                    <td>
                        <textarea 
                        rows="4"
                        cols="40"
                        maxlength="500"
                        id="notes"
                        name="notes"
                        title="Please enter any additional information about your medical history"
                        placeholder="Insert text here..."
                        ></textarea> 
                        <span id="description_text"></span>
                    </td>
                </tr>

                <!--Range slider-->
                <tr>
                    <td class="td1"><label for="range">Urgency of Appointment: <br/> (Rate from 1-10)</label></td>
                    <td> 
                        <input
                        type="range"
                        id="range"
                        name="range"
                        min="1"
                        max="10"
                        value="0"
                        />
                        <span id="range_slider"></span>
                    </td>
                </tr>

                <tr> 
                    <td class="td1"><label for="uName">Username:</label></td>
                    <td>
                        <input 
                        type="text" 
                        name="uName"
                        id="uName"
                        maxlength="30"
                        required
                        title="Please enter a username"
                        placeholder="newuser123"
                        />
                    </td>
                </tr> 

                <tr> 
                    <td class="td1"><label for="pword">Password:</label></td>
                    <td>
                        <input 
                        type="password" 
                        name="pword"
                        id="pword"
                        minlength="10"
                        maxlength="30"
                        required
                        title="Please enter a password"
                        placeholder="••••••••"
                        />
                    </td>
                </tr>

                <tr> 
                    <td class="td1"><label for="con-pword">Confirm Password:</label></td>
                    <td>
                        <input 
                        type="password" 
                        name="con-pword"
                        id="con-pword"
                        minlength="10"
                        maxlength="30"
                        required
                        title="Please confirm your password"
                        placeholder="••••••••"
                        />
                    </td>
                </tr>

                <tr> 
                    <td class="td1" colspan="4">
                        <center>
                            <input type="submit" name="submit" id="submit">
                            <input type="reset" name="reset" id="reset">
                        </center>
                    </td>
                </tr>

            </table>
        </div>
    </center>
</form>

<footer>
    <p id="footer">Copyright &copy; 2026 Kona Clinic | <a href="https://www.linkedin.com/in/ashish-ali/" target="_blank" rel="noopener noreferrer">Contact Us</a></p>
</footer>

<script src="hw1.js"></script>

    </body>        
</html>
